name: Auto AI Summary Ticket

permissions:
  contents: read
  issues: write

on:
  push:
    branches: [ main ]

jobs:
  build-ticket:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google Gen AI SDK
        run: pip install google-genai

      - name: Run Python Summarizer Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script/summary_push.py

      - name: Create Automated GitHub Issue
        if: hashFiles('summary.txt') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title " Automated Summary: Push to main" \
            --body-file summary.txt \
            --label "documentation"